<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена | Borozdov Nikita</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-obsidian: #010101;
            --color-titanium: #FFFFFF;
            --color-slate: #444444;
        }
        body {
            background-color: var(--color-obsidian);
            color: var(--color-titanium);
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(68, 68, 68, 0.15) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .quote {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: 1.8rem;
            max-width: 800px;
            margin-bottom: 2rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        .message {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-slate);
            margin-bottom: 3rem;
            font-size: 0.9rem;
        }
        a {
            font-family: 'Archivo Black', sans-serif;
            color: var(--color-titanium);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 1rem 2rem;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        a:hover {
            background-color: var(--color-titanium);
            color: var(--color-obsidian);
        }
    </style>
</head>
<body>
    <div class="quote">
        «Трудно найти черную кошку в темной комнате, особенно если ее там нет». — Конфуций
    </div>
    <div class="message">
        То же самое касается и этой страницы. Ошибка 404.
    </div>
    <a href="/">На главную</a>
</body>
</html>
